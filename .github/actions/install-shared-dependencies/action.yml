name: Install shared software dependencies
description: "Install shared software dependencies like OS packages, Rust toolchain, and Valkey server."

inputs:
    os:
        description: "The current operating system (see 'os-matrix.json')"
        required: true
    target:
        description: "Specified target for rust toolchain (see 'os-matrix.json')"
        required: true
    server-version:
        description: >-
            Server version to install (see 'server-matrix.json').
            Skips server installation if not specified.
        required: false
    github-token:
        description: "GitHub token for protoc installation (defaults to GITHUB_TOKEN env var)"
        required: false
        default: ${{ github.token }}

runs:
    using: "composite"
    steps:
        - name: Install software dependencies for macOS
          shell: bash
          if: "${{ inputs.os == 'macos' }}"
          run: |
              brew update
              brew install openssl coreutils

        - name: Install software dependencies for Ubuntu GNU
          shell: bash
          if: "${{ inputs.os == 'ubuntu' }}"
          run: |
              sudo apt update -y
              sudo apt install -y git gcc pkg-config openssl libssl-dev

        - name: Install software dependencies for Amazon-Linux
          shell: bash
          if: "${{ inputs.os == 'amazon-linux' }}"
          run: |
              yum install -y gcc pkgconfig openssl openssl-devel which curl gettext libasan tar --allowerasing

        # In Windows runners, the Valkey servers run within WSL.
        #   - Use WSL bash shell – see <https://github.com/Vampire/setup-wsl>.
        #   - WSL is not available on Windows ARM runners – see #383.
        - name: Install software dependencies for Windows
          if: "${{ runner.os == 'Windows' && runner.arch != 'ARM64' }}"
          uses: Vampire/setup-wsl@887f39deb6c0976365e546926fe66f41b77d65ff # v6.0.0
          with:
              distribution: Ubuntu-22.04
              use-cache: true
              update: true
              additional-packages: python3 python3-pip build-essential git pkg-config libssl-dev

        # Shared actions from valkey-glide submodule
        - name: Install Rust toolchain
          uses: ./valkey-glide/.github/actions/install-rust
          with:
              target: ${{ inputs.target }}

        - name: Install protoc
          uses: ./valkey-glide/.github/actions/install-protoc
          with:
              github-token: ${{ inputs.github-token }}

        # Always build from source first. This installs 'valkey-cli', which is
        # needed by 'start-valkey-docker' to start servers in Docker.
        # Valkey servers cannot be installed on Windows ARM runners - see #383.
        - name: Install server from source
          if: "${{ inputs.server-version && !(runner.os == 'Windows' && runner.arch == 'ARM64') }}"
          uses: ./valkey-glide/.github/actions/install-engine
          with:
              engine-version: ${{ inputs.server-version }}
              target: ${{ inputs.target }}

        # For valkey 9.0 on ubuntu, also start Docker containers with the
        # valkey-bundle image (includes modules: Search, JSON, Bloom, LDAP) on
        # dedicated ports. Regular tests use the source-built server; module
        # tests connect to these Docker containers via modules-standalone-endpoint
        # and modules-cluster-endpoints env vars.
        - name: Start module servers via Docker (valkey 9.0, ubuntu)
          if: "${{ inputs.server-version == '9.0' && inputs.os == 'ubuntu' }}"
          uses: ./valkey-glide/.github/actions/start-valkey-docker
          with:
              engine-version: ${{ inputs.server-version }}

        - name: Install zig
          if: ${{ contains(inputs.target, 'linux-gnu') }}
          uses: ./valkey-glide/.github/actions/install-zig
