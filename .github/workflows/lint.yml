name: lint

on:
    push:
        branches:
            - main
            - release-*
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  submodules: true

            - name: Install Rust
              uses: ./.github/actions/install-rust

            - name: Cache Rust
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: rust/target
                  # Use 'Cargo.toml' hash so the cache invalidates when dependencies change.
                  key: rust-lint-${{ hashFiles('rust/Cargo.toml') }}
                  # On cache miss, restore the most recent cache with this prefix so cargo
                  # only recompiles changed dependencies instead of building from scratch.
                  restore-keys: rust-lint-

            - name: Install cargo-deny and actionlint
              uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2.52.4
              with:
                  tool: |
                      cargo-deny
                      actionlint@1.7.12

            - name: Install dotnet
              uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
              with:
                  dotnet-version: "8"

            - name: Install Task
              uses: go-task/setup-task@dc4f00a24b1b0b5e1a9265f6f4e81d65c0862414 # v2.0.0

            - name: Run lint
              run: task lint
