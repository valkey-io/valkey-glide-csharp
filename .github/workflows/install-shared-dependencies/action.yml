name: Install shared software dependencies

inputs:
    os:
        description: "The current operating system"
        required: true
        # See 'os-matrix.json'
        type: choice
        options:
            - ubuntu
            - amazon-linux
            - macos
            - windows
    target:
        description: "Specified target for rust toolchain"
        required: true
        # See 'os-matrix.json'
        type: choice
        options:
            - x86_64-unknown-linux-gnu
            - aarch64-unknown-linux-gnu
            - x86_64-apple-darwin
            - aarch64-apple-darwin
            - x86_64-pc-windows-msvc
            - aarch64-pc-windows-msvc
    server-version:
        description: "Server version to install"
        required: true
        # See 'server-matrix.json'
        type: choice
        options:
            - 9.0
            - 8.1
            - 8.0
            - 7.2
            - 7.0
            - 6.2
    github-token:
        description: "GITHUB_TOKEN, GitHub App installation access token"
        type: string

runs:
    using: "composite"
    steps:
        - name: Install software dependencies for macOS
          shell: bash
          if: "${{ inputs.os == 'macos' }}"
          run: |
              brew update
              brew install openssl coreutils

        - name: Install software dependencies for Ubuntu GNU
          shell: bash
          if: "${{ inputs.os == 'ubuntu' }}"
          run: |
              sudo apt update -y
              sudo apt install -y git gcc pkg-config openssl libssl-dev

        - name: Install software dependencies for Amazon-Linux
          shell: bash
          if: "${{ inputs.os == 'amazon-linux' }}"
          run: |
              yum install -y gcc pkgconfig openssl openssl-devel which curl gettext libasan tar --allowerasing

        # In Windows runners, the Valkey servers run within WSL.
        # These can be accessed via the WSL bash shell.
        # See <https://github.com/Vampire/setup-wsl> for more details.
        # WSL2 is not available on windows-11-arm runners (no Hyper-V), so skip for aarch64.
        - name: Install software dependencies for Windows
          if: "${{ inputs.os == 'windows' && !contains(inputs.target, 'aarch64') }}"
          uses: Vampire/setup-wsl@v7
          with:
              distribution: Ubuntu-22.04
              additional-packages: python3 build-essential git pkg-config libssl-dev

        - name: Install Rust toolchain
          uses: ./.github/workflows/install-rust
          with:
              target: ${{ inputs.target }}

        # Always build from source first. This installs 'valkey-cli', which is
        # needed by 'start-valkey-docker' to start servers in Docker.
        - name: Install server from source
          if: "${{ inputs.server-version }}"
          uses: ./.github/workflows/install-server
          with:
              os: ${{ inputs.os }}
              target: ${{ inputs.target }}
              server-version: ${{ inputs.server-version }}

        # For valkey 9.0 on ubuntu, also start Docker containers with the
        # valkey-bundle image (includes modules: Search, JSON, Bloom, LDAP) on
        # dedicated ports. Regular tests use the source-built server; module
        # tests connect to these Docker containers via modules-standalone-endpoint
        # and modules-cluster-endpoints env vars.
        - name: Start module servers via Docker (valkey 9.0, ubuntu)
          if: "${{ inputs.server-version == '9.0' && inputs.os == 'ubuntu' }}"
          uses: ./.github/workflows/start-valkey-docker
          with:
              engine-version: ${{ inputs.server-version }}

        - name: Install zig
          if: ${{ contains(inputs.target, 'linux-gnu') }}
          uses: ./.github/workflows/install-zig
