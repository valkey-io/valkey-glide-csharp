name: check-examples

on:
    push:
        branches:
            - main
            - release-*
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    check-examples:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: true

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "8.0.x"

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Task
              run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

            - name: Build Valkey.Glide
              run: task build target=lib framework=net8.0

            - name: Check examples
              run: task check-examples
