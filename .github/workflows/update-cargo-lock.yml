name: Update Cargo.lock

on:
    pull_request:
        paths:
            - valkey-glide

    # TODO #449: Remove workflow_dispatch after validating.
    workflow_dispatch:
        inputs:
            pr-branch:
                description: "PR branch to update Cargo.lock on"
                required: true
                type: string

permissions:
    contents: write

jobs:
    update-cargo-lock:
        # TODO #449: Restore github.actor check after validating.
        # if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  submodules: true

                  # TODO #449: Remove github.event.inputs.pr-branch  after validating.
                  ref: ${{ github.event.inputs.pr-branch || github.head_ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust
              uses: ./valkey-glide/.github/actions/install-rust
              with:
                  target: x86_64-unknown-linux-gnu

            - name: Update Cargo.lock
              working-directory: rust
              run: cargo update --workspace

            - name: Check for changes
              id: check
              run: |
                  git add rust/Cargo.lock
                  if git diff --cached --quiet; then
                    echo "No changes to Cargo.lock"
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Commit and push changes
              if: steps.check.outputs.changed == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git commit -m "chore(deps): update Cargo.lock"
                  git push
