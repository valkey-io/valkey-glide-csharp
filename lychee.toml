# File extensions to scan for links.
extensions = ["md", "cs"]

# Directories to exclude from scanning.
exclude_path = [
    "rust/target",       # Rust build directory
    ".*/bin", ".*/obj",  # .NET build directories
    "valkey-glide",      # Valkey GLIDE submodule.
]

# Links to exclude from scanning.
exclude = [
    "example\\.com",    # Example URLs
    "file://.*example", # Example file URIs

    # Valkey Search alias command pages do not exist yet on valkey.io.
    # TODO #353: Remove these exclusions after alias command docs are published on valkey.io
    "https://valkey\\.io/commands/ft\\.aliasadd/",
    "https://valkey\\.io/commands/ft\\.aliasdel/",
    "https://valkey\\.io/commands/ft\\.aliasupdate/",
    "https://valkey\\.io/commands/ft\\._aliaslist/",
]

# Check links inside code blocks
include_verbatim = true

# Exclude loopback addresses (localhost, 127.0.0.1, [::1])
exclude_loopback = true

cache = true
verbose = "warn"
